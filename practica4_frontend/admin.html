<!DOCTYPE html>
<html lang="en">
  <head>
    <title>DASW - Administración</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
      integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous" />
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.1.1/css/all.css"
      integrity="sha384-O8whS3fhG2OnA5Kas0Y9l3cfpmYjapjI0E4theH4iuMD+pLhbf6JI0jIMfYcK3yZ" crossorigin="anonymous" />
  </head>
  <body>
    <nav class="navbar navbar-expand navbar-dark bg-dark">
      <a class="navbar-brand nav-item nav-link active" href="home.html">DASW</a>
      <div class="collapse navbar-collapse">
        <ul class="navbar-nav ml-auto">
          <li class="nav-item">
            <a class="nav-link" href="home.html">Tienda</a>
          </li>
          <li class="nav-item dropdown" id="navbarUser">
          </li>
        </ul>
      </div>
    </nav>

    <div class="container mt-4">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Administración de productos</h2>
        <button class="btn btn-success" id="btnNuevoProducto">
          <i class="fas fa-plus"></i> Nuevo producto
        </button>
      </div>

      <div id="adminAlerta" class="alert d-none"></div>

      <div class="table-responsive">
        <table class="table table-bordered table-hover bg-white">
          <thead class="thead-dark">
            <tr>
              <th style="width:70px;">Imagen</th>
              <th>Título</th>
              <th>Descripción</th>
              <th>Categoría</th>
              <th>Precio</th>
              <th>Unidad</th>
              <th>Stock</th>
              <th style="width:120px;">Acciones</th>
            </tr>
          </thead>
          <tbody id="tablaProductos">
            <tr><td colspan="8" class="text-center">Cargando...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- Modal: Crear / Editar producto -->
    <div class="modal fade" id="modalProducto" tabindex="-1" role="dialog" aria-hidden="true">
      <div class="modal-dialog modal-lg" role="document">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="modalProductoTitulo">Nuevo producto</h5>
            <button type="button" class="close" data-dismiss="modal"><span>&times;</span></button>
          </div>
          <div class="modal-body">
            <div id="formError" class="alert alert-danger d-none"></div>
            <input type="hidden" id="productoId" />
            <div class="form-row">
              <div class="form-group col-md-8">
                <label>Título <span class="text-danger">*</span></label>
                <input type="text" id="productoTitle" class="form-control" placeholder="Nombre del producto" />
              </div>
              <div class="form-group col-md-4">
                <label>Categoría <span class="text-danger">*</span></label>
                <input type="text" id="productoCategory" class="form-control" placeholder="fruta, lácteo..." />
              </div>
            </div>
            <div class="form-group">
              <label>Descripción <span class="text-danger">*</span></label>
              <textarea id="productoDescription" class="form-control" rows="2"
                placeholder="Descripción breve del producto"></textarea>
            </div>
            <div class="form-row">
              <div class="form-group col-md-4">
                <label>Precio <span class="text-danger">*</span></label>
                <div class="input-group">
                  <div class="input-group-prepend"><span class="input-group-text">$</span></div>
                  <input type="number" id="productoPrecio" class="form-control" placeholder="0.00" min="0" step="0.01" />
                </div>
              </div>
              <div class="form-group col-md-4">
                <label>Unidad <span class="text-danger">*</span></label>
                <input type="text" id="productoUnit" class="form-control" placeholder="pieza, kg, litro..." />
              </div>
              <div class="form-group col-md-4">
                <label>Stock <span class="text-danger">*</span></label>
                <input type="number" id="productoStock" class="form-control" placeholder="0" min="0" />
              </div>
            </div>
            <div class="form-group">
              <label>URL de imagen <span class="text-muted">(opcional)</span></label>
              <input type="text" id="productoImage" class="form-control"
                placeholder="http://localhost:3100/images/nombre.jpg" />
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-dismiss="modal">Cancelar</button>
            <button type="button" class="btn btn-primary" id="btnGuardarProducto">
              <i class="fas fa-save"></i> Guardar
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Modal: Confirmar eliminación -->
    <div class="modal fade" id="modalEliminar" tabindex="-1" role="dialog" aria-hidden="true">
      <div class="modal-dialog modal-sm" role="document">
        <div class="modal-content">
          <div class="modal-header bg-danger text-white">
            <h5 class="modal-title">Eliminar producto</h5>
            <button type="button" class="close text-white" data-dismiss="modal"><span>&times;</span></button>
          </div>
          <div class="modal-body">
            <p>¿Seguro que quieres eliminar <strong id="eliminarNombre"></strong>?</p>
            <p class="text-muted small">Esta acción no se puede deshacer.</p>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-dismiss="modal">Cancelar</button>
            <button type="button" class="btn btn-danger" id="btnConfirmarEliminar">
              <i class="fas fa-trash"></i> Eliminar
            </button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"
      integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"
      integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1" crossorigin="anonymous"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"
      integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM" crossorigin="anonymous"></script>
    <script src="admin.js"></script>
  </body>
</html>
