<!DOCTYPE html>
<html lang="en">
  <head>
    <title>DASW Tienda</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
      integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous" />
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.1.1/css/all.css"
      integrity="sha384-O8whS3fhG2OnA5Kas0Y9l3cfpmYjapjI0E4theH4iuMD+pLhbf6JI0jIMfYcK3yZ" crossorigin="anonymous" />
    <style>
      .carousel-item img { max-height: 300px; }
      .card-img-top { max-height: 200px; width: auto; }
    </style>
  </head>
  <body>
    <nav class="navbar navbar-expand navbar-dark bg-dark">
      <a class="navbar-brand nav-item nav-link active" href="#">DASW</a>
      <div class="flex-grow-1">
        <form class="form-inline" id="searchForm">
          <input class="form-control col-sm-9 col-lg-10" type="search" id="searchInput"
            placeholder="Buscar por nombre o categoría..." aria-label="Search" />
          <button class="btn btn-outline-light col-sm-3 col-lg-2" type="submit">Buscar</button>
        </form>
      </div>
      <div class="collapse navbar-collapse">
        <ul class="navbar-nav ml-auto">
          <li class="nav-item dropdown" id="navbarUser">
            <!-- llenado dinámicamente por home.js -->
          </li>
          <li class="nav-item">
            <a class="nav-link" href="shopping_cart.html">
              <i class="fas fa-shopping-cart"></i>
              <span class="badge badge-warning" id="cartBadge">0</span>
            </a>
          </li>
        </ul>
      </div>
    </nav>

    <!-- Alerta de carrito -->
    <div id="alertaCarrito" class="alert alert-success d-none m-2" role="alert"></div>

    <div id="mainBanner" class="carousel slide" data-ride="carousel">
      <ol class="carousel-indicators">
        <li data-target="#mainBanner" data-slide-to="0" class="active"></li>
        <li data-target="#mainBanner" data-slide-to="1"></li>
        <li data-target="#mainBanner" data-slide-to="2"></li>
      </ol>
      <div class="carousel-inner" role="listbox">
        <div class="carousel-item active">
          <img class="w-100" src="https://images.freeimages.com/images/small-previews/eb9/winter-road-1410833.jpg" alt="First slide" />
        </div>
        <div class="carousel-item">
          <img class="w-100" src="https://images.freeimages.com/images/small-previews/b8d/irish-landscape-1393571.jpg" alt="Second slide" />
        </div>
        <div class="carousel-item">
          <img class="w-100" src="https://images.freeimages.com/images/small-previews/8e1/winter-sunrise-1501607.jpg" alt="Third slide" />
        </div>
      </div>
      <a class="carousel-control-prev" href="#mainBanner" role="button" data-slide="prev">
        <span class="carousel-control-prev-icon" aria-hidden="true"></span>
        <span class="sr-only">Previous</span>
      </a>
      <a class="carousel-control-next" href="#mainBanner" role="button" data-slide="next">
        <span class="carousel-control-next-icon" aria-hidden="true"></span>
        <span class="sr-only">Next</span>
      </a>
    </div>

    <div class="container mb-5 mt-4" id="mainList">
      <!-- Tarjetas de productos generadas dinámicamente -->
    </div>

    <nav aria-label="Page navigation" id="paginationContainer">
      <ul class="pagination justify-content-center pagination-lg" id="paginationList">
      </ul>
    </nav>

    <!-- Modal: Login -->
    <div class="modal fade" id="login" tabindex="-1" role="dialog" aria-hidden="true">
      <div class="modal-dialog modal-sm" role="document">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Iniciar sesión</h5>
            <button type="button" class="close" data-dismiss="modal"><span>&times;</span></button>
          </div>
          <div class="modal-body">
            <div id="loginError" class="alert alert-danger d-none"></div>
            <div class="form-group">
              <label>Usuario</label>
              <input type="text" id="loginUsuario" class="form-control" placeholder="Tu nombre de usuario" />
            </div>
            <div class="form-group">
              <label>Contraseña</label>
              <input type="password" id="loginPassword" class="form-control" placeholder="••••••••" />
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-dismiss="modal">Cancelar</button>
            <button type="button" class="btn btn-primary" id="btnLogin">Ingresar</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Modal: Registro -->
    <div class="modal fade" id="signup" tabindex="-1" role="dialog" aria-hidden="true">
      <div class="modal-dialog modal-sm" role="document">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Crear cuenta</h5>
            <button type="button" class="close" data-dismiss="modal"><span>&times;</span></button>
          </div>
          <div class="modal-body">
            <div id="signupError" class="alert alert-danger d-none"></div>
            <div class="form-group">
              <label>Usuario</label>
              <input type="text" id="signupUsuario" class="form-control" placeholder="Elige un nombre de usuario" />
            </div>
            <div class="form-group">
              <label>Contraseña</label>
              <input type="password" id="signupPassword" class="form-control" placeholder="••••••••" />
            </div>
            <div class="form-group">
              <label>Confirmar contraseña</label>
              <input type="password" id="signupConfirm" class="form-control" placeholder="••••••••" />
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-dismiss="modal">Cancelar</button>
            <button type="button" class="btn btn-success" id="btnSignup">Registrarse</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Modal: Agregar al carrito -->
    <div class="modal fade" id="modalCarrito" tabindex="-1" role="dialog" aria-labelledby="modalCarritoLabel" aria-hidden="true">
      <div class="modal-dialog" role="document">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="modalCarritoLabel">Agregar al carrito</h5>
            <button type="button" class="close" data-dismiss="modal" aria-label="Cerrar">
              <span aria-hidden="true">&times;</span>
            </button>
          </div>
          <div class="modal-body text-center">
            <img id="modalImagen" src="" alt="" class="img-fluid mb-3" style="max-height:200px;object-fit:contain;" />
            <h5 id="modalNombre"></h5>
            <p class="text-muted mb-1" id="modalCategoria"></p>
            <p class="mb-1"><small class="text-secondary">Unidad: </small><span id="modalUnidad" class="font-weight-bold"></span></p>
            <p class="font-weight-bold h5 mb-3" id="modalPrecio"></p>
            <div class="form-group">
              <label for="modalCantidad">Cantidad</label>
              <input type="number" id="modalCantidad" class="form-control w-50 mx-auto" value="1" min="1" />
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-dismiss="modal">Cancelar</button>
            <button type="button" class="btn btn-primary" id="btnConfirmarCarrito">
              <i class="fas fa-shopping-cart"></i> Agregar
            </button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"
      integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"
      integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1" crossorigin="anonymous"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"
      integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM" crossorigin="anonymous"></script>
    <script src="home.js"></script>
  </body>
</html>
